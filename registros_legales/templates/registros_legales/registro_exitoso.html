<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro enviado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background: #f4f6f8; min-height: 100vh; }
        .success-icon {
            align-items: center;
            background: #198754;
            border-radius: 50%;
            color: #fff;
            display: inline-flex;
            font-size: 2rem;
            height: 4.5rem;
            justify-content: center;
            width: 4.5rem;
        }
    </style>
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body text-center p-5">

                    <div class="success-icon mb-4" aria-hidden="true">✓</div>

                    <h2 class="mb-3">
                        Registro enviado
                    </h2>

                    <p class="text-muted mb-4">
                        Tu información fue enviada correctamente y quedó pendiente
                        de validación por la academia.
                    </p>

                    <a id="homeButton"
                       href="{% url 'gestion:home_publica' %}"
                       class="btn btn-primary btn-lg px-4">
                        Ir al inicio
                    </a>

                    <p class="small text-muted mt-3 mb-0" aria-live="polite">
                        Regresaremos al inicio automáticamente en
                        <strong><span id="countdown">8</span> segundos</strong>.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
    const homeUrl = "{% url 'gestion:home_publica' %}";
    const countdown = document.getElementById('countdown');
    const homeButton = document.getElementById('homeButton');
    let secondsRemaining = 8;

    sessionStorage.setItem('registroEstudianteFinalizado', Date.now().toString());

    function returnHome() {
        window.location.replace(homeUrl);
    }

    homeButton.addEventListener('click', function (event) {
        event.preventDefault();
        returnHome();
    });

    const redirectTimer = window.setInterval(function () {
        secondsRemaining -= 1;
        countdown.textContent = secondsRemaining;

        if (secondsRemaining <= 0) {
            window.clearInterval(redirectTimer);
            returnHome();
        }
    }, 1000);
</script>

</body>
</html>
