{% load static %}
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Modo TV</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#0d1822;color:#f7f9fb;font-family:system-ui;overflow:hidden}.screen{height:100vh;padding:22px 30px;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #263a4b;padding-bottom:14px}.brand{font-size:26px;font-weight:900}.clock{font-size:32px;font-weight:800}.panel{flex:1;min-height:0}.overview{display:grid;grid-template-columns:42% 1fr;gap:24px;padding-top:24px}.class-card,.attendees{background:#162735;border-radius:24px;padding:28px}.status{color:#58d68d;font-weight:900;letter-spacing:.12em}.class-title{font-size:clamp(38px,5vw,78px);line-height:1;margin:16px 0}.meta{font-size:25px;color:#bed0df;line-height:1.6}.count{font-size:clamp(70px,10vw,150px);font-weight:950;color:#4da3ff}.attendees{overflow:hidden}.attendees h2{margin:0 0 15px;font-size:30px}.names{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.name{background:#203646;border-radius:12px;padding:12px 16px;font-size:clamp(17px,2vw,28px);font-weight:750}.timer{display:none;padding-top:8px}.fighter{height:28vh;display:grid;grid-template-columns:18% 15% 1fr;background:#162735;border-bottom:5px solid #0d1822}.points{display:grid;place-items:center;font-size:clamp(90px,16vh,190px);font-weight:950}.red .points{background:#d60b3c}.blue .points{background:#1878ba}.extras{display:grid;grid-template-rows:1fr 1fr;background:#fff;color:#111;text-align:center}.extra{display:grid;place-items:center;border-bottom:4px solid #e8edf1;font-size:20px}.extra b{font-size:clamp(42px,7vh,75px)}.extra.penalty b{color:#dc3545}.fighter-name{display:flex;align-items:center;padding:30px;font-size:clamp(40px,6vw,90px);font-weight:450;overflow:hidden}.timer-phase{text-align:center;color:#ffc107;font-size:clamp(18px,2.5vh,30px);font-weight:950;letter-spacing:.14em;height:1.15em}.big-time{text-align:right;font-size:clamp(85px,15vh,165px);line-height:.9;font-variant-numeric:tabular-nums}.ended{color:#ffca2c}.sound-gate{position:fixed;inset:0;z-index:30;display:grid;place-items:center;background:rgba(5,12,18,.94)}.sound-gate button{padding:22px 35px;border:0;border-radius:20px;background:#198754;color:#fff;font-size:28px;font-weight:900}.bracket{display:none;height:100%;overflow:auto;padding:18px 0}.bracket-board{display:flex;gap:20px;min-width:max-content;height:100%}.bracket-round{width:260px;display:flex;flex-direction:column;justify-content:space-around;gap:10px}.round-title{text-align:center;font-weight:900;color:#8fb3ce}.match{background:#172a38;border:1px solid #345066;border-radius:14px;padding:8px}.slot{padding:9px;border-radius:8px;font-size:19px;font-weight:800}.slot.winner{background:#175d3a;color:#8dffc0}.slot.bye{color:#ffc107}.champion{display:grid;place-items:center;color:#ffc107;font-size:40px;text-align:center}.youtube-float{position:fixed;right:18px;bottom:18px;z-index:15;width:clamp(260px,27vw,430px);aspect-ratio:16/9;background:#000;border:3px solid #4da3ff;border-radius:14px;overflow:hidden;box-shadow:0 12px 35px #000;transition:width .2s}.youtube-float.large{width:min(62vw,900px)}.youtube-float.hidden{display:none}.youtube-float iframe,.youtube-float #youtubePlayer{width:100%;height:100%}.youtube-label{position:absolute;left:8px;top:7px;z-index:2;background:rgba(0,0,0,.7);padding:4px 8px;border-radius:6px;font-size:12px;font-weight:800;pointer-events:none}@media(max-width:700px){.screen{padding:10px}.overview{grid-template-columns:1fr}.attendees{display:none}.fighter{grid-template-columns:27% 23% 1fr}.fighter-name{font-size:28px;padding:10px}.youtube-float{width:42vw}}
</style>
</head>
<body>
<div id="soundGate" class="sound-gate"><button onclick="enableSound()">🔊 Activar sonido y comenzar</button></div>
<audio id="bell" src="{% static 'sonidos/campana.mp3' %}" preload="auto"></audio>
<audio id="claps" src="{% static 'sonidos/palmas.mp3' %}" preload="auto"></audio>
<div class="screen">
  <header class="top"><div class="brand">GALERAS BJJ</div><div id="clock" class="clock"></div></header>
  <main class="panel">
    <section id="overview" class="overview"><div class="class-card"><div id="classStatus" class="status"></div><div id="classTitle" class="class-title"></div><div id="classMeta" class="meta"></div><div><span id="classTotal" class="count">0</span><span class="meta"> asistentes</span></div></div><div class="attendees"><h2>ESTUDIANTES CONFIRMADOS</h2><div id="names" class="names"></div></div></section>
    <section id="timer" class="timer"><div class="fighter red"><div id="redPoints" class="points">0</div><div class="extras"><div class="extra">VENTAJAS <b id="redAdvantages">0</b></div><div class="extra penalty">FALTAS <b id="redPenalties">0</b></div></div><div id="redName" class="fighter-name"></div></div><div class="fighter blue"><div id="bluePoints" class="points">0</div><div class="extras"><div class="extra">VENTAJAS <b id="blueAdvantages">0</b></div><div class="extra penalty">FALTAS <b id="bluePenalties">0</b></div></div><div id="blueName" class="fighter-name"></div></div><div id="timerPhase" class="timer-phase"></div><div id="bigTime" class="big-time">05:00</div></section>
    <section id="bracket" class="bracket"><div id="bracketBoard" class="bracket-board"></div></section>
  </main>
</div>
<div id="youtubeFloat" class="youtube-float hidden"><div class="youtube-label">YOUTUBE</div><div id="youtubePlayer"></div></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const stateUrl="{% url 'gestion:estado_tv' sesion_tv.token %}";
const $=id=>document.getElementById(id);
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
let soundEnabled=false,lastSound=null,audioContext=null,ytPlayer=null,ytReady=false,lastYoutubeCommand=null,lastVideoId=null,pendingState=null;

function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('youtubePlayer',{height:'100%',width:'100%',playerVars:{playsinline:1,rel:0,controls:1},events:{onReady:()=>{ytReady=true;if(pendingState)syncYoutube(pendingState)}}});
}
async function enableSound(){
  soundEnabled=true;
  audioContext=new(window.AudioContext||window.webkitAudioContext)();
  if(audioContext.state==='suspended')await audioContext.resume();
  for(const id of ['bell','claps']){const a=$(id);a.load();a.volume=.001;try{await a.play();a.pause();a.currentTime=0}catch(e){}a.volume=1}
  if(ytReady){ytPlayer.setVolume(pendingState?.youtube_volume??35)}
  $('soundGate').style.display='none';
}
function fallbackSound(type){if(!audioContext)return;const count=type==='claps'?3:1;for(let i=0;i<count;i++){const o=audioContext.createOscillator(),g=audioContext.createGain(),t=audioContext.currentTime+i*.22;o.frequency.value=type==='claps'?1500:850;g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.connect(g);g.connect(audioContext.destination);o.start(t);o.stop(t+.18)}}
function playEvent(e){if(!soundEnabled||!e||e.id===lastSound)return;lastSound=e.id;const audio=$(e.type==='claps'?'claps':'bell');audio.currentTime=0;audio.play().catch(()=>fallbackSound(e.type))}
function syncYoutube(s){
  pendingState=s;
  const box=$('youtubeFloat');
  box.classList.toggle('hidden',!s.youtube_visible||!s.youtube_video_id);
  box.classList.toggle('large',s.youtube_size==='large');
  if(!ytReady||!s.youtube_video_id)return;
  if(lastVideoId!==s.youtube_video_id){ytPlayer.cueVideoById(s.youtube_video_id);lastVideoId=s.youtube_video_id}
  ytPlayer.setVolume(s.youtube_volume??35);
  const command=s.youtube_command;
  if(!command||command.id===lastYoutubeCommand)return;
  lastYoutubeCommand=command.id;
  if(command.type==='load'){ytPlayer.loadVideoById(s.youtube_video_id)}
  if(command.type==='play')ytPlayer.playVideo();
  if(command.type==='pause')ytPlayer.pauseVideo();
  if(command.type==='stop')ytPlayer.stopVideo();
}
function renderBracket(b){const board=$('bracketBoard');if(!b){board.innerHTML='<h1>CREA UNA LLAVE DESDE EL CELULAR</h1>';return}const labels=['PRIMERA RONDA','CUARTOS','SEMIFINAL','FINAL'];const last=b.rounds[b.rounds.length-1][0];board.innerHTML=b.rounds.map((round,ri)=>`<div class="bracket-round"><div class="round-title">${labels[Math.max(0,labels.length-b.rounds.length+ri)]}</div>${round.map(m=>`<div class="match">${[m.p1,m.p2].map(p=>`<div class="slot ${p==='__BYE__'?'bye':''} ${m.winner===p&&p!=='__BYE__'?'winner':''}">${p==='__BYE__'?'BYE · PASE DIRECTO':(p||'POR DEFINIR')}</div>`).join('')}</div>`).join('')}</div>`).join('')+`<div class="bracket-round champion">🏆<br>${last.winner||'POR DEFINIR'}</div>`}
function render(d){const s=d.state,c=d.class;$('clock').textContent=new Date(d.server_time).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});$('overview').style.display=s.mode==='overview'?'grid':'none';$('timer').style.display=s.mode==='timer'?'block':'none';$('bracket').style.display=s.mode==='bracket'?'block':'none';$('classStatus').textContent=c.active?'ENTRENANDO AHORA':'PRÓXIMA CLASE';$('classTitle').textContent=c.title;$('classMeta').innerHTML=c.time?`${c.time}<br>${c.discipline}<br>${c.instructor}`:'';$('classTotal').textContent=c.total;$('names').innerHTML=c.attendees.length?c.attendees.map(n=>`<div class="name">${n}</div>`).join(''):'<div class="meta">Aún no hay confirmaciones.</div>';['red','blue'].forEach(side=>{$(side+'Name').textContent=s[side+'_name'];$(side+'Points').textContent=s[side+'_points'];$(side+'Advantages').textContent=s[side+'_advantages'];$(side+'Penalties').textContent=s[side+'_penalties']});$('timerPhase').textContent=s.display_phase==='preparation'?'ALISTAMIENTO':(s.display_phase==='ended'?'ROUND FINALIZADO':'');$('bigTime').textContent=fmt(s.display_remaining);$('bigTime').classList.toggle('ended',s.display_remaining===0);renderBracket(s.bracket);syncYoutube(s);playEvent(s.sound_event)}
async function sync(){try{const r=await fetch(stateUrl,{cache:'no-store'});if(r.status===410){document.body.innerHTML='<h1 style="padding:10vw">SESIÓN TV VENCIDA</h1>';return}render(await r.json())}catch(e){}}
sync();setInterval(sync,500);
</script>
</body>
</html>
