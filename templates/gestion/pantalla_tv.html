<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Modo TV</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#0d1822;color:#f7f9fb;font-family:system-ui;overflow:hidden}.screen{height:100vh;padding:22px 30px;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #263a4b;padding-bottom:14px}.brand{font-size:26px;font-weight:900}.clock{font-size:32px;font-weight:800}.panel{flex:1;min-height:0}.overview{display:grid;grid-template-columns:42% 1fr;gap:24px;padding-top:24px}.class-card{background:#162735;border-radius:24px;padding:28px}.status{color:#58d68d;font-weight:900;letter-spacing:.12em}.class-title{font-size:clamp(38px,5vw,78px);line-height:1;margin:16px 0}.meta{font-size:25px;color:#bed0df;line-height:1.6}.count{font-size:clamp(70px,10vw,150px);font-weight:950;color:#4da3ff}.attendees{background:#162735;border-radius:24px;padding:24px;overflow:hidden}.attendees h2{margin:0 0 15px;font-size:30px}.names{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.name{background:#203646;border-radius:12px;padding:12px 16px;font-size:clamp(17px,2vw,28px);font-weight:750}.timer{display:none;padding-top:8px}.fighter{height:28vh;display:grid;grid-template-columns:18% 15% 1fr;background:#162735;border-bottom:5px solid #0d1822}.points{display:grid;place-items:center;font-size:clamp(90px,16vh,190px);font-weight:950}.red .points{background:#d60b3c}.blue .points{background:#1878ba}.extras{display:grid;grid-template-rows:1fr 1fr;background:#fff;color:#111;text-align:center}.extra{display:grid;place-items:center;border-bottom:4px solid #e8edf1;font-size:20px}.extra b{font-size:clamp(42px,7vh,75px)}.extra.penalty b{color:#dc3545}.fighter-name{display:flex;align-items:center;padding:30px;font-size:clamp(40px,6vw,90px);font-weight:450;overflow:hidden}.big-time{text-align:right;font-size:clamp(90px,18vh,190px);line-height:1;font-variant-numeric:tabular-nums}.ended{color:#ffca2c}@media(max-width:700px){.screen{padding:10px}.overview{grid-template-columns:1fr}.attendees{display:none}.fighter{grid-template-columns:27% 23% 1fr}.fighter-name{font-size:28px;padding:10px}}
</style></head><body><div class="screen"><header class="top"><div class="brand">GALERAS BJJ · MODO TV</div><div id="clock" class="clock"></div></header><main class="panel"><section id="overview" class="overview"><div class="class-card"><div id="classStatus" class="status"></div><div id="classTitle" class="class-title"></div><div id="classMeta" class="meta"></div><div><span id="classTotal" class="count">0</span><span class="meta"> asistentes</span></div></div><div class="attendees"><h2>ESTUDIANTES CONFIRMADOS</h2><div id="names" class="names"></div></div></section><section id="timer" class="timer"><div class="fighter red"><div id="redPoints" class="points">0</div><div class="extras"><div class="extra">VENTAJAS <b id="redAdvantages">0</b></div><div class="extra penalty">FALTAS <b id="redPenalties">0</b></div></div><div id="redName" class="fighter-name"></div></div><div class="fighter blue"><div id="bluePoints" class="points">0</div><div class="extras"><div class="extra">VENTAJAS <b id="blueAdvantages">0</b></div><div class="extra penalty">FALTAS <b id="bluePenalties">0</b></div></div><div id="blueName" class="fighter-name"></div></div><div id="bigTime" class="big-time">05:00</div></section></main></div>
<script>const stateUrl="{% url 'gestion:estado_tv' sesion_tv.token %}";const $=id=>document.getElementById(id);const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;function render(d){const s=d.state,c=d.class;$('clock').textContent=new Date(d.server_time).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});$('overview').style.display=s.mode==='overview'?'grid':'none';$('timer').style.display=s.mode==='timer'?'block':'none';$('classStatus').textContent=c.active?'ENTRENANDO AHORA':'PRÓXIMA CLASE';$('classTitle').textContent=c.title;$('classMeta').innerHTML=c.time?`${c.time}<br>${c.discipline}<br>${c.instructor}`:'';$('classTotal').textContent=c.total;$('names').innerHTML=c.attendees.length?c.attendees.map(n=>`<div class="name">${n}</div>`).join(''):'<div class="meta">Aún no hay confirmaciones.</div>';['red','blue'].forEach(side=>{const p=side[0].toUpperCase()+side.slice(1);$(side+'Name').textContent=s[side+'_name'];$(side+'Points').textContent=s[side+'_points'];$(side+'Advantages').textContent=s[side+'_advantages'];$(side+'Penalties').textContent=s[side+'_penalties']});$('bigTime').textContent=fmt(s.display_remaining);$('bigTime').classList.toggle('ended',s.display_remaining===0)}async function sync(){try{const r=await fetch(stateUrl,{cache:'no-store'});if(r.status===410){document.body.innerHTML='<h1 style="padding:10vw">SESIÓN TV VENCIDA</h1>';return}render(await r.json())}catch(e){}}sync();setInterval(sync,1000);</script></body></html>
