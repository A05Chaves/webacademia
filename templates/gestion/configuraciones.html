{% extends 'gestion/base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2 class="mb-0">
        <i class="fa-solid fa-gear"></i>
        Configuraciones
    </h2>

    <a href="{% url 'gestion:dashboard' %}"
       class="btn btn-outline-light btn-sm">
        <i class="fa-solid fa-arrow-left"></i>
        Volver
    </a>

</div>

<div class="row g-4">

    <div class="col-md-6 col-lg-3">

        <a href="{% url 'gestion:configurar_home' %}"
           class="text-decoration-none">

            <div class="card bg-dark text-light border-secondary h-100">

                <div class="card-body text-center py-4">

                    <i class="fa-brands fa-youtube fa-2x mb-3 text-danger"></i>

                    <h5 class="mb-2">
                        Música / Home
                    </h5>

                    <p class="text-secondary small mb-0">
                        Video principal y playlist.
                    </p>

                </div>

            </div>

        </a>

    </div>

    <div class="col-md-6 col-lg-3">

        <a href="{% url 'gestion:configurar_horario' %}"
           class="text-decoration-none">

            <div class="card bg-dark text-light border-secondary h-100">

                <div class="card-body text-center py-4">

                    <i class="fa-solid fa-calendar-days fa-2x mb-3 text-info"></i>

                    <h5 class="mb-2">
                        Horario
                    </h5>

                    <p class="text-secondary small mb-0">
                        Días y horas visibles.
                    </p>

                </div>

            </div>

        </a>

    </div>

</div>

{% endblock %}
