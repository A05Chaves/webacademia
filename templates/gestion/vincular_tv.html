<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vincular TV</title>
<style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#101c27;color:#fff;font-family:system-ui}.box{width:min(520px,90vw);text-align:center}.code{width:100%;box-sizing:border-box;padding:18px;font-size:36px;letter-spacing:.25em;text-align:center;border:2px solid #33495d;border-radius:18px}.btn{margin-top:16px;width:100%;padding:16px;border:0;border-radius:16px;background:#0d6efd;color:#fff;font-size:20px;font-weight:800}.error{color:#ff7b84}</style></head><body><main class="box"><h1>Vincular pantalla TV</h1><p>Escribe el código temporal mostrado en el control del profesor.</p>{% if error %}<p class="error">{{ error }}</p>{% endif %}<form method="post">{% csrf_token %}<input class="code" name="codigo" inputmode="numeric" maxlength="6" required autofocus><button class="btn">Conectar pantalla</button></form></main></body></html>
