{% extends 'gestion/base.html' %}

{% block content %}
<h2>Registrar pago</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
    <a href="{% url 'gestion:lista_pagos' %}">Cancelar</a>
    <a href="{% url 'gestion:dashboard' %}">Home</a>
</form>
{% endblock %}
