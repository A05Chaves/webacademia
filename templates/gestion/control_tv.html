{% extends 'gestion/base.html' %}
{% block content %}
{% csrf_token %}
<style>
.tv-control{max-width:900px;margin:auto;padding:22px}.tv-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:20px;margin-bottom:16px}.tv-code{font-size:42px;font-weight:950;letter-spacing:.18em}.control-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.fighter-control{border-radius:18px;padding:16px;color:#fff}.fighter-control.red{background:#b60b34}.fighter-control.blue{background:#1169a7}.control-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.control-row button{min-height:46px;min-width:54px;font-weight:900;border-radius:12px}.name-input{width:100%;padding:12px;border:0;border-radius:10px;text-transform:uppercase}.score-value{font-size:55px;font-weight:950}.bracket-control{display:flex;gap:12px;overflow-x:auto;margin-top:14px}.bracket-column{min-width:210px}.mobile-match{border:1px solid var(--border-color);border-radius:12px;padding:8px;margin:8px 0}.mobile-slot{display:block;width:100%;padding:8px;margin:3px 0;border:0;border-radius:8px;text-align:left}.mobile-slot.winner{background:#198754;color:#fff}@media(max-width:650px){.control-grid{grid-template-columns:1fr}.tv-control{padding:10px}}
</style>
<div class="tv-control">
    <h1>Control Modo TV</h1>
    <div class="tv-card"><div>Código temporal:</div><div class="tv-code">{{ sesion_tv.codigo }}</div><small>Vence: {{ sesion_tv.expira_en|date:'d/m/Y H:i' }}</small><div><a href="{{ tv_url }}" target="_blank">Abrir pantalla directamente</a></div></div>
    <div class="tv-card"><h3>Vista del TV</h3><div class="control-row"><button class="btn btn-primary" onclick="action('mode','overview')">Asistencia</button><button class="btn btn-dark" onclick="action('mode','timer')">Marcador</button><button class="btn btn-info" onclick="action('mode','bracket')">Llaves</button></div></div>
    <div class="tv-card"><h3>Cronómetro</h3><div id="mobilePhase" class="text-warning fw-bold"></div><div id="mobileTime" style="font-size:58px;font-weight:950">05:00</div><div class="control-row"><button class="btn btn-success" onclick="action('start')">Iniciar / continuar</button><button class="btn btn-warning" onclick="action('pause')">Pausar</button><button class="btn btn-secondary" onclick="action('reset')">Reiniciar todo</button><select id="duration" class="form-select" style="width:auto" onchange="action('duration',this.value)"><option value="3">3 min</option><option value="5" selected>5 min</option><option value="6">6 min</option><option value="8">8 min</option><option value="10">10 min</option></select></div></div>
    <div class="control-grid">
        <div class="fighter-control red"><input id="redNameInput" class="name-input" value="COMPETIDOR ROJO"><div class="score-value" id="redScore">0</div><div class="control-row"><button onclick="score('red_points',1)">+1</button><button onclick="score('red_points',-1)">−1</button><button onclick="score('red_advantages',1)">V+</button><button onclick="score('red_advantages',-1)">V−</button><button onclick="score('red_penalties',1)">F+</button><button onclick="score('red_penalties',-1)">F−</button></div><button id="victoryRed" class="btn btn-light w-100 mt-2" disabled onclick="fightWinner('red')">🏆 Dar victoria</button></div>
        <div class="fighter-control blue"><input id="blueNameInput" class="name-input" value="COMPETIDOR AZUL"><div class="score-value" id="blueScore">0</div><div class="control-row"><button onclick="score('blue_points',1)">+1</button><button onclick="score('blue_points',-1)">−1</button><button onclick="score('blue_advantages',1)">V+</button><button onclick="score('blue_advantages',-1)">V−</button><button onclick="score('blue_penalties',1)">F+</button><button onclick="score('blue_penalties',-1)">F−</button></div><button id="victoryBlue" class="btn btn-light w-100 mt-2" disabled onclick="fightWinner('blue')">🏆 Dar victoria</button></div>
    </div>
    <button class="btn btn-outline-primary w-100 mt-3" onclick="saveNames()">Guardar nombres</button>
    <div class="tv-card mt-3"><div class="d-flex justify-content-between"><h3>Llaves</h3><button class="btn btn-outline-danger btn-sm" onclick="resetBracket()">Nueva llave</button></div><div class="row g-2"><div class="col-4"><select id="bracketSize" class="form-select"><option>4</option><option>8</option><option>10</option><option>12</option><option>16</option></select></div><div class="col-8"><button class="btn btn-primary w-100" onclick="createBracket()">Crear llave</button></div></div><textarea id="bracketNames" class="form-control mt-2" rows="6" placeholder="Un participante por línea"></textarea><div id="mobileBracket" class="bracket-control"></div></div>
</div>
<script>
const actionUrl="{% url 'gestion:accion_tv' sesion_tv.token %}",stateUrl="{% url 'gestion:estado_tv' sesion_tv.token %}";
const csrf=()=>document.cookie.split('; ').find(x=>x.startsWith('csrftoken='))?.split('=')[1]||'';
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
async function send(data){const r=await fetch(actionUrl,{method:'POST',headers:{'X-CSRFToken':csrf(),'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(data)});const result=await r.json();if(!r.ok)alert(result.error||'No se pudo realizar la acción');return result}
async function action(a,v){await send({action:a,value:v??''});sync()}
async function score(field,delta){await send({action:field,delta:String(delta)});sync()}
async function saveNames(){await send({action:'names',red_name:document.getElementById('redNameInput').value,blue_name:document.getElementById('blueNameInput').value});sync()}
async function createBracket(){await send({action:'bracket_create',size:document.getElementById('bracketSize').value,names:document.getElementById('bracketNames').value});sync()}
async function winner(round,match,name){await send({action:'bracket_winner',round,match,winner:name});sync()}
async function loadFight(round,match){await send({action:'bracket_load',round,match});sync()}
async function fightWinner(side){if(confirm('¿Confirmar este ganador?')){await send({action:'fight_winner',side});sync()}}
async function resetBracket(){if(confirm('¿Borrar la llave completa y crear una nueva?')){await send({action:'bracket_reset'});document.getElementById('bracketNames').value='';sync()}}
function renderBracket(b){const el=document.getElementById('mobileBracket');if(!b){el.innerHTML='<span class="text-secondary">No hay una llave creada.</span>';return}el.innerHTML=b.rounds.map((round,ri)=>`<div class="bracket-column"><b>RONDA ${ri+1}</b>${round.map((m,mi)=>`<div class="mobile-match">${[m.p1,m.p2].map(p=>`<button class="mobile-slot ${m.winner===p&&p!=='__BYE__'?'winner':''}" ${!p||p==='__BYE__'?'disabled':''} onclick="winner(${ri},${mi},decodeURIComponent('${encodeURIComponent(p||'')}'))">${p==='__BYE__'?'BYE':(p||'POR DEFINIR')}</button>`).join('')}${m.p1&&m.p2&&m.p1!=='__BYE__'&&m.p2!=='__BYE__'?`<button class="btn btn-outline-primary btn-sm w-100 mt-1" onclick="loadFight(${ri},${mi})">⏱ Llevar al cronómetro</button>`:''}</div>`).join('')}</div>`).join('')}
async function sync(){const d=await(await fetch(stateUrl,{cache:'no-store'})).json(),s=d.state;document.getElementById('mobilePhase').textContent=s.display_phase==='preparation'?'ALISTAMIENTO':(s.display_phase==='ended'?'ROUND FINALIZADO':'');document.getElementById('mobileTime').textContent=fmt(s.display_remaining);document.getElementById('redScore').textContent=s.red_points;document.getElementById('blueScore').textContent=s.blue_points;document.getElementById('victoryRed').disabled=!s.active_match;document.getElementById('victoryBlue').disabled=!s.active_match;if(document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){document.getElementById('redNameInput').value=s.red_name;document.getElementById('blueNameInput').value=s.blue_name}renderBracket(s.bracket)}
sync();setInterval(sync,1000);
</script>
{% endblock %}
