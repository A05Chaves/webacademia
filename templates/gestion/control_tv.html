{% extends 'gestion/base.html' %}{% block content %}{% csrf_token %}<style>.tv-control{max-width:900px;margin:auto;padding:22px}.tv-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:20px;margin-bottom:16px}.tv-code{font-size:42px;font-weight:950;letter-spacing:.18em}.control-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.fighter-control{border-radius:18px;padding:16px;color:#fff}.fighter-control.red{background:#b60b34}.fighter-control.blue{background:#1169a7}.control-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.control-row button{min-height:46px;min-width:54px;font-weight:900;border-radius:12px}.name-input{width:100%;padding:12px;border:0;border-radius:10px;text-transform:uppercase}.score-value{font-size:55px;font-weight:950}@media(max-width:650px){.control-grid{grid-template-columns:1fr}.tv-control{padding:10px}}</style><div class="tv-control"><h1>Control Modo TV</h1><div class="tv-card"><div>Código temporal para vincular el TV:</div><div class="tv-code">{{ sesion_tv.codigo }}</div><small>Vence: {{ sesion_tv.expira_en|date:'d/m/Y H:i' }}</small><div class="mt-2"><a href="{{ tv_url }}" target="_blank">Abrir pantalla directamente</a></div></div><div class="tv-card"><h3>Vista del TV</h3><div class="control-row"><button class="btn btn-primary" onclick="action('mode','overview')">Asistencia y clase</button><button class="btn btn-dark" onclick="action('mode','timer')">Marcador</button></div></div><div class="tv-card"><h3>Cronómetro</h3><div id="mobileTime" style="font-size:58px;font-weight:950">05:00</div><div class="control-row"><button class="btn btn-success" onclick="action('start')">Iniciar / continuar</button><button class="btn btn-warning" onclick="action('pause')">Pausar</button><button class="btn btn-secondary" onclick="action('reset')">Reiniciar</button><select id="duration" class="form-select" style="width:auto" onchange="action('duration',this.value)"><option value="3">3 min</option><option value="5" selected>5 min</option><option value="6">6 min</option><option value="8">8 min</option><option value="10">10 min</option></select></div></div><div class="control-grid"><div class="fighter-control red"><input id="redNameInput" class="name-input" value="COMPETIDOR ROJO"><div class="score-value" id="redScore">0</div><div class="control-row"><button onclick="score('red_points',1)">+1</button><button onclick="score('red_points',-1)">−1</button><button onclick="score('red_advantages',1)">V+</button><button onclick="score('red_advantages',-1)">V−</button><button onclick="score('red_penalties',1)">F+</button><button onclick="score('red_penalties',-1)">F−</button></div></div><div class="fighter-control blue"><input id="blueNameInput" class="name-input" value="COMPETIDOR AZUL"><div class="score-value" id="blueScore">0</div><div class="control-row"><button onclick="score('blue_points',1)">+1</button><button onclick="score('blue_points',-1)">−1</button><button onclick="score('blue_advantages',1)">V+</button><button onclick="score('blue_advantages',-1)">V−</button><button onclick="score('blue_penalties',1)">F+</button><button onclick="score('blue_penalties',-1)">F−</button></div></div></div><button class="btn btn-outline-primary w-100 mt-3" onclick="saveNames()">Guardar nombres</button></div>
<script>const actionUrl="{% url 'gestion:accion_tv' sesion_tv.token %}",stateUrl="{% url 'gestion:estado_tv' sesion_tv.token %}";const csrf=()=>document.cookie.split('; ').find(x=>x.startsWith('csrftoken='))?.split('=')[1]||'';const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;async function send(data){const body=new URLSearchParams(data);const r=await fetch(actionUrl,{method:'POST',headers:{'X-CSRFToken':csrf(),'Content-Type':'application/x-www-form-urlencoded'},body});return r.json()}async function action(a,v){await send({action:a,value:v??''});sync()}async function score(field,delta){await send({action:field,delta:String(delta)});sync()}async function saveNames(){await send({action:'names',red_name:document.getElementById('redNameInput').value,blue_name:document.getElementById('blueNameInput').value});sync()}async function sync(){const d=await(await fetch(stateUrl,{cache:'no-store'})).json(),s=d.state;document.getElementById('mobileTime').textContent=fmt(s.display_remaining);document.getElementById('redScore').textContent=s.red_points;document.getElementById('blueScore').textContent=s.blue_points;if(document.activeElement.tagName!=='INPUT'){document.getElementById('redNameInput').value=s.red_name;document.getElementById('blueNameInput').value=s.blue_name}}sync();setInterval(sync,1000);</script>{% endblock %}
