{% extends 'gestion/base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-5 px-2">
    <h2 class="mb-0">
        <i class="fa-solid fa-calendar-check"></i>
        Crear pago programado
    </h2>

    <a href="{% url 'gestion:dashboard' %}" class="btn btn-outline-light btn-sm">
        <i class="fa-solid fa-arrow-left"></i>
        Volver
    </a>
</div>

<div class="card bg-dark text-light border-secondary">
    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Concepto</label>
                    {{ form.concepto }}
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Valor</label>
                    {{ form.valor }}
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Fecha de vencimiento</label>
                    {{ form.fecha_vencimiento }}
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Cuenta sugerida de pago</label>
                    {{ form.cuenta_pago }}
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Observaciones</label>
                    {{ form.observaciones }}
                </div>

            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="{% url 'gestion:dashboard' %}" class="btn btn-outline-light">
                    <i class="fa-solid fa-xmark"></i>
                    Cancelar
                </a>

                <button type="submit" class="btn btn-success">
                    <i class="fa-solid fa-check"></i>
                    Guardar pago programado
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
