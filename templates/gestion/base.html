<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión Academia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body {
            background-color: #121212;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .navbar-custom {
            background-color: #1f1f1f;
            border-bottom: 2px solid #333;
        }

        .navbar-brand {
            font-weight: bold;
            color: #fff !important;
        }

        .nav-link {
            color: #ccc !important;
            transition: 0.2s ease;
        }

        .nav-link:hover {
            color: #fff !important;
        }

        .main-container {
            padding: 25px;
        }

        .card-custom {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn-custom {
            background-color: #2d6cdf;
            color: white;
            border: none;
        }

        .btn-custom:hover {
            background-color: #1f57ba;
        }

        .messages-container p {
            padding: 10px;
            border-radius: 6px;
            background-color: #222;
            border-left: 4px solid #2d6cdf;
        }

       

        table {
            width: 100%;
        }

        .table-dark-custom {
            background-color: #1e1e1e;
            color: #f1f1f1;
            border-radius: 10px;
            overflow: hidden;
        }

        .table-dark-custom thead {
            background-color: #2b2b2b;
        }

        .table-dark-custom th,
        .table-dark-custom td {
            vertical-align: middle;
            border-color: #333;
        }

        .table-dark-custom tbody tr:hover {
            background-color: #2a2a2a;
        }

        .badge-activo {
            background-color: #198754;
            padding: 6px 10px;
            border-radius: 20px;
        }

        .badge-vencido {
            background-color: #dc3545;
            padding: 6px 10px;
            border-radius: 20px;
        }

        .badge-proximo {
            background-color: #ffc107;
            color: black;
            padding: 6px 10px;
            border-radius: 20px;
        }

    </style>

  

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid">

            <a class="navbar-brand" href="{% url 'gestion:horario_clases' %}">
                <i class="fa-solid fa-dumbbell"></i> Academia
            </a>

            <div class="collapse navbar-collapse">

                <!-- IZQUIERDA -->
                <ul class="navbar-nav">

                    <li class="nav-item me-2">
                        <a class="btn btn-outline-light btn-sm"
                        href="{% url 'gestion:horario_clases' %}">
                            <i class="fa-solid fa-house"></i> Home
                        </a>
                    </li>

                    {% if user.is_authenticated and user.is_staff %}

                        <li class="nav-item me-2">
                            <a class="btn btn-outline-light btn-sm"
                            href="{% url 'gestion:dashboard' %}">
                                <i class="fa-solid fa-chart-line"></i> Dashboard
                            </a>
                        </li>

                        <li class="nav-item me-2">
                            <a class="btn btn-outline-light btn-sm"
                            href="{% url 'gestion:lista_alumnos' %}">
                                <i class="fa-solid fa-users"></i> Alumnos
                            </a>
                        </li>

                        <li class="nav-item me-2">
                            <a class="btn btn-outline-light btn-sm"
                            href="{% url 'gestion:lista_planes' %}">
                                <i class="fa-solid fa-layer-group"></i> Planes
                            </a>
                        </li>

                        <li class="nav-item me-2">
                            <a class="btn btn-outline-light btn-sm"
                            href="{% url 'gestion:lista_suscripciones' %}">
                                <i class="fa-solid fa-id-card"></i> Suscripciones
                            </a>
                        </li>

                        <li class="nav-item me-2">
                            <a class="btn btn-outline-light btn-sm"
                            href="{% url 'gestion:lista_pagos' %}">
                                <i class="fa-solid fa-money-bill"></i> Pagos
                            </a>
                        </li>

                    {% endif %}

                </ul>

            </div>

        </div>
    </nav>

    <div class="container-fluid main-container">

        {% if messages %}

            <div class="messages-container">

                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}

            </div>

        {% endif %}

        <div class="card-custom">

            {% block content %}{% endblock %}

        </div>

    </div>

</body>

</html>
