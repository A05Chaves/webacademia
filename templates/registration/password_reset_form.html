{% extends 'gestion/base.html' %}

{% block content %}

<h2>Recuperar contraseña</h2>

<form method="post">
    {% csrf_token %}

    <label>Correo registrado</label>
    {{ form.email }}

    <button type="submit" class="btn btn-outline-light mt-3">
        Enviar enlace
    </button>
</form>

{% endblock %}
